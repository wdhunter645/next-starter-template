name: Design Compliance (Warn)

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  design_compliance_warn:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Design Compliance Check
        uses: actions/github-script@e69ef54c2d3f3b2f5a1cdbcc5dfdf2f72c8e2d6c
        with:
          script: |
            // Get PR details
            const prNumber = context.payload.pull_request.number;
            const prBody = context.payload.pull_request.body || '';
            
            // Get changed files
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            
            const changedFiles = files.map(f => f.filename);
            
            // Initialize findings
            const warnings = [];
            const passed = [];
            
            // ============================================================
            // Step 1: Validate PR template gates
            // ============================================================
            const requiredSections = [
              'MANDATORY FIRST STEP (ZIP SAFETY)',
              'DESIGN SOURCE OF TRUTH (NON-NEGOTIABLE)',
              'FILE-TOUCH ALLOWLIST (MANDATORY)',
              'VISUAL / UX INVARIANTS (MANDATORY)',
              'REQUIRED PRE-REVIEW SELF-CHECK'
            ];
            
            for (const section of requiredSections) {
              if (prBody.includes(section)) {
                passed.push(`✅ Required section present: "${section}"`);
              } else {
                warnings.push(`⚠️ Missing required PR template section: "${section}"`);
              }
            }
            
            // ============================================================
            // Step 2: Validate ZIP safety statement
            // ============================================================
            // Accept equivalent phrases (case-insensitive, pattern-based):
            //   "No ZIP found in repo root"
            //   "No ZIP file exists in [the] repo root"
            //   "No ZIP file exists in repo root"
            // OR explicit deletion confirmation
            const hasNoZipStatement = /no zip(?:\s+file)?\s+(?:found|exists|present)\s+in(?:\s+the)?\s+repo\s+root/i.test(prBody);
            const hasZipDeletionProof = /ZIP.*(?:deleted|removed)|(?:deleted|removed).*ZIP/i.test(prBody);
            const hasZipStatement = hasNoZipStatement || hasZipDeletionProof;
            
            if (hasZipStatement) {
              passed.push('✅ ZIP safety statement present');
            } else {
              warnings.push(
                '⚠️ Missing ZIP safety statement\n' +
                '  **What failed:** No ZIP safety confirmation found in PR body\n' +
                '  **Why:** The PR body must confirm that no ZIP files exist in the repo root, or that any ZIP was deleted as the first step\n' +
                '  **Fix:** Add one of the following to your PR body under "MANDATORY FIRST STEP (ZIP SAFETY)":\n' +
                '    - `- [x] No ZIP file exists in the repo root`\n' +
                '    - `- [x] No ZIP found in repo root`\n' +
                '    - `- [x] Any ZIP file present in the repo root was deleted before any other change`'
              );
            }
            
            // ============================================================
            // Step 3: Parse file-touch allowlist from PR body
            // ============================================================
            let allowlist = [];
            let allowlistParsed = false;
            
            // Extract "Allowed files:" section
            // Look for section starting with "Allowed files:" up to next major section or end
            const allowedFilesMatch = prBody.match(/Allowed files?:([\s\S]*?)(?=\n##|$)/i);
            
            if (allowedFilesMatch) {
              const allowedSection = allowedFilesMatch[1];
              // Extract bullet points (lines starting with - or *)
              // Match optional backticks around the filepath
              const bulletRegex = /^[\s]*[-*]\s*`?([^`\n]+?)`?\s*$/gm;
              let match;
              
              while ((match = bulletRegex.exec(allowedSection)) !== null) {
                const filepath = match[1].trim();
                // Skip empty lines, section headers, and the "Forbidden:" marker
                if (filepath && 
                    filepath.length > 0 && 
                    !filepath.match(/^[A-Z][^:]*:$/) &&
                    !filepath.toLowerCase().includes('forbidden')) {
                  allowlist.push(filepath);
                }
              }
              
              if (allowlist.length > 0) {
                allowlistParsed = true;
                passed.push(`✅ File-touch allowlist parsed: ${allowlist.length} file(s)`);
              } else {
                warnings.push('⚠️ File-touch allowlist section found but is empty or unparseable');
              }
            } else {
              warnings.push('⚠️ File-touch allowlist section missing or unparseable (expected "Allowed files:" section)');
            }
            
            // ============================================================
            // Step 4: Compare changed files against allowlist
            // ============================================================
            if (allowlistParsed) {
              const outOfAllowlist = [];
              
              for (const file of changedFiles) {
                // Ignore the workflow file itself
                if (file === '.github/workflows/design-compliance-warn.yml') {
                  continue;
                }
                
                if (!allowlist.includes(file)) {
                  outOfAllowlist.push(file);
                }
              }
              
              if (outOfAllowlist.length === 0) {
                passed.push('✅ All changed files are in the allowlist');
              } else {
                warnings.push(`⚠️ Changed files outside allowlist (${outOfAllowlist.length}):\n${outOfAllowlist.map(f => `  - ${f}`).join('\n')}`);
              }
            }
            
            // ============================================================
            // Step 5: Docs-change heuristic
            // ============================================================
            const isDocFile = (f) => {
              return f.startsWith('docs/') || 
                     f.endsWith('.md') || 
                     f.endsWith('.rst') || 
                     f.endsWith('.txt') ||
                     f.includes('/README') ||
                     f.includes('/CHANGELOG');
            };
            
            const codeFiles = changedFiles.filter(f => !isDocFile(f));
            const docFiles = changedFiles.filter(f => isDocFile(f));
            
            // Check whether PR body contains explicit docs justification
            // e.g. "No documentation updates required", "No documentation update required"
            const hasDocsJustification = /(?:no documentation(?:\s+updates?)?\s+required|no\s+docs?\s+(?:updates?\s+)?required)/i.test(prBody);
            
            if (codeFiles.length > 0 && docFiles.length === 0 && !hasDocsJustification) {
              warnings.push(
                '⚠️ Docs update REQUIRED or explicitly justified in PR body\n' +
                `  **What failed:** ${codeFiles.length} code/config file(s) changed with no docs updated and no justification in PR body\n` +
                '  **Why:** Code or config changes may require corresponding documentation updates in /docs/\n' +
                '  **Fix:** Either update the relevant docs under /docs/ OR add an explicit statement in your PR body such as:\n' +
                '    `- [x] No documentation updates required — <brief reason>`'
              );
            } else if (docFiles.length > 0) {
              passed.push('✅ Documentation changes detected');
            } else if (hasDocsJustification) {
              passed.push('✅ Docs justification present in PR body');
            }
            
            // ============================================================
            // Step 6: Generate outputs
            // ============================================================
            
            // Build job summary
            let summary = '## Design Compliance (Warn) — Findings\n\n';
            
            if (warnings.length === 0) {
              summary += '### ✅ All checks passed\n\n';
              summary += 'No design compliance warnings detected.\n\n';
            } else {
              summary += '### ⚠️ Warnings Detected\n\n';
              summary += 'The following warnings were found. These are **informational only** and do not block the PR.\n\n';
              for (const warning of warnings) {
                summary += `${warning}\n\n`;
              }
              summary += '\n---\n\n';
              summary += '### Required Actions\n\n';
              summary += '1. Review warnings above\n';
              summary += '2. Update PR description to include required sections and allowlist\n';
              summary += '3. Ensure changed files match your documented allowlist\n';
              summary += '4. Resolve warnings before marking PR "Ready for Review"\n\n';
            }
            
            if (passed.length > 0) {
              summary += '### ✅ Passed Checks\n\n';
              for (const check of passed) {
                summary += `${check}\n\n`;
              }
            }
            
            summary += '\n---\n\n';
            summary += '**Note:** This check is informational only and does not block PR merges. ';
            summary += 'Warnings should be addressed before requesting review.\n';
            
            // Write job summary
            await core.summary
              .addRaw(summary)
              .write();
            
            // Build PR comment
            const commentMarker = '<!-- design-compliance-warn -->';
            let commentBody = commentMarker + '\n\n';
            commentBody += '## 🔍 Design Compliance (Warn) — Findings\n\n';
            
            if (warnings.length === 0) {
              commentBody += '### ✅ All checks passed\n\n';
              commentBody += 'No design compliance warnings detected. Great work!\n';
            } else {
              commentBody += '> **Note:** This is an informational check only. Warnings do not block the PR.\n\n';
              commentBody += '### ⚠️ Warnings\n\n';
              for (const warning of warnings) {
                commentBody += `${warning}\n\n`;
              }
              commentBody += '### 📋 Next Steps\n\n';
              commentBody += '1. Review warnings above\n';
              commentBody += '2. Update PR description to include required template sections\n';
              commentBody += '3. Add file-touch allowlist under "Allowed files:" in PR body\n';
              commentBody += '4. Ensure all changed files are documented in allowlist\n';
              commentBody += '5. Resolve warnings before marking "Ready for Review"\n\n';
            }
            
            if (passed.length > 0) {
              commentBody += '<details>\n<summary>✅ Passed Checks</summary>\n\n';
              for (const check of passed) {
                commentBody += `${check}\n\n`;
              }
              commentBody += '</details>\n\n';
            }
            
            commentBody += '---\n\n';
            commentBody += '*This check runs automatically on PR open/edit/sync. It helps ensure PRs follow the documented design process.*\n';
            
            // Post or update comment (idempotent)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            
            const existingComment = comments.find(c => c.body?.includes(commentMarker));
            
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: commentBody,
              });
              console.log('Updated existing comment');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: commentBody,
              });
              console.log('Created new comment');
            }
            
            // Always exit successfully (this is a warn-only check)
            console.log('Design compliance check completed successfully');
