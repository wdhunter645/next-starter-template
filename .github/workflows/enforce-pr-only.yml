name: Enforce PR Only Changes

on:
  push:
    branches:
      - main

permissions:
  pull-requests: read

jobs:
  block-direct-push:
    runs-on: ubuntu-latest

    steps:
      - name: Fail if push is not associated with a merged PR
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          pr_number="$(gh api "repos/${GH_REPO}/commits/${GITHUB_SHA}/pulls" \
            -H 'Accept: application/vnd.github+json' \
            --jq 'map(select(.merged_at != null))[0].number // ""')"

          if [ -n "$pr_number" ]; then
            echo "Push to main is associated with merged PR #${pr_number}."
            exit 0
          fi

          echo "::error::Direct pushes to main are not allowed. All changes must go through approved PRs."
          exit 1
