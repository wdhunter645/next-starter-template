name: LGFC Orchestrator - pr_state_sync

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft, closed]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync PR lifecycle state to linked Issues
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const statusRegex = /(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const linkedIssueNumbers = [...body.matchAll(statusRegex)].map(m => Number(m[3]));
            const uniqueIssueNumbers = [...new Set(linkedIssueNumbers)];

            if (uniqueIssueNumbers.length === 0) {
              core.info('No linked Issues detected in PR body.');
              return;
            }

            let nextStatus = 'status:pr-open';
            let lifecycleMessage = 'LGFC Orchestrator: PR opened.';
            if (context.payload.action === 'converted_to_draft') {
              nextStatus = 'status:in-progress';
              lifecycleMessage = 'LGFC Orchestrator: PR converted to draft; builder still in progress.';
            } else if (context.payload.action === 'synchronize') {
              lifecycleMessage = 'LGFC Orchestrator: PR updated.';
            } else if (context.payload.action === 'closed' && pr.merged) {
              nextStatus = 'status:post-merge-verify';
              lifecycleMessage = 'LGFC Orchestrator: merge complete.';
            } else if (context.payload.action === 'closed' && !pr.merged) {
              nextStatus = 'status:failed';
              lifecycleMessage = 'LGFC Orchestrator: PR closed without merge.';
            }

            for (const issueNumber of uniqueIssueNumbers) {
              const issue = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
              const current = (issue.data.labels || []).map(l => l.name);
              const keep = current.filter(name => !name.startsWith('status:'));
              await github.rest.issues.setLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: [...keep, nextStatus]
              });

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: [
                  lifecycleMessage,
                  `PR: ${pr.html_url}`,
                  `PR state: ${pr.state}${pr.merged ? ' (merged)' : ''}`
                ].join('\n')
              });
            }
