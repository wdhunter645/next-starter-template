name: GATE — Reviewer Response

# Superseded by Task 003 reviewer lifecycle redesign.
# Active enforcement lives in reviewer-response-completion.yml, which uses
# scripts/ci/reviewer_lifecycle_gate.mjs for blocking on pull_request_target,
# pull_request_review, pull_request_review_comment, and PR issue_comment events.

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  reviewer-response-disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Reviewer Response gate superseded
        run: |
          echo "GATE — Reviewer Response remains disabled."
          echo "Use GATE — Reviewer Response Completion for Task 003 reviewer lifecycle enforcement."
          echo "See docs/reference/ci/reviewer-lifecycle-surface.md"
