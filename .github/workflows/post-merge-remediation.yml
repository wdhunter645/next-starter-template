name: Post-Merge Remediation

on:
  workflow_run:
    workflows: ['Post-Merge Detection']
    types: [completed]

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  remediate:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download validation result
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          name: post-merge-validation-result
          path: post-merge-validation-result

      - name: Run deterministic self-healing before remediation issue creation
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node scripts/ci/post_merge_self_heal_backlog.mjs \
            --output post-merge-self-heal-backlog.json \
            --apply
          DETECT_ARGS=(
            --issues post-merge-self-heal-backlog.json
            --result post-merge-validation-result/post-merge-result.json
            --output post-merge-self-heal-detection.json
          )
          node scripts/ci/post_merge_self_heal_detect.mjs "${DETECT_ARGS[@]}"
          node scripts/ci/post_merge_self_heal_apply.mjs \
            --report post-merge-self-heal-detection.json \
            --output post-merge-self-heal-apply.json \
            --apply

      - name: Create or update remediation issue
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          POST_MERGE_RESULT_PATH: post-merge-validation-result/post-merge-result.json
        run: node scripts/ci/post_merge_remediation_issue.mjs

      - name: Close duplicate remediation issues
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/ci/close_duplicate_remediation_issues.mjs
