name: Project Implementation Orchestrator

on:
  pull_request_target:
    types: [closed]

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - name: Create Issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          issue_url=$(gh issue create \
            --repo "${{ github.repository }}" \
            --title "TEST — Cursor Orchestration" \
            --body "Orchestration test" \
            --label "agent:cursor")
          issue_number=${issue_url##*/}
          gh issue comment "$issue_number" \
            --repo "${{ github.repository }}" \
            --body "@cursor Please take this issue.\n\n@cursor autofix on"
