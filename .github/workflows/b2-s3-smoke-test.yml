name: OPS — B2 S3 Smoke Test

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * *" # Daily at 06:15 UTC, before the sync job

concurrency:
  group: b2-s3-smoke-test
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Install AWS CLI v2
        run: bash scripts/ci/install_aws_cli_v2.sh

      - name: Run B2 S3 Smoke Test
        id: smoke
        env:
          B2_ENDPOINT: ${{ secrets.B2_ENDPOINT }}
          B2_BUCKET: ${{ secrets.B2_BUCKET }}
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APP_KEY: ${{ secrets.B2_APP_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.B2_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_APP_KEY }}
          AWS_EC2_METADATA_DISABLED: true
          AWS_DEFAULT_REGION: us-east-1
        run: bash scripts/b2_s3_smoketest.sh

      - name: Write runtime step summary
        if: always()
        run: |
          {
            echo "## OPS — B2 S3 Smoke Test"
            echo "- Result: ${{ steps.smoke.outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Escalate runtime failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OPS_ESCALATION_WORKFLOW: OPS — B2 S3 Smoke Test
          OPS_ESCALATION_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          OPS_ESCALATION_DETAILS: B2 S3 smoke test failed. Review scripts/b2_s3_smoketest.sh output and B2 secret configuration.
          OPS_ESCALATION_LABELS: ops-runtime-failure,b2-runtime
        run: node scripts/ci/ops_runtime_escalation.mjs
