name: OPS — Agent Doctrine Issue Closeout

on:
  workflow_dispatch:
    inputs:
      issue_numbers:
        description: Comma-separated issue numbers to close as completed
        required: true
        default: '1268,1262,1283'

permissions:
  issues: write

jobs:
  close-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Close listed issues
        uses: actions/github-script@v7
        with:
          script: |
            const raw = String('${{ inputs.issue_numbers }}' || '');
            const numbers = raw
              .split(',')
              .map((value) => value.trim())
              .filter(Boolean)
              .map((value) => Number(value))
              .filter((value) => Number.isInteger(value) && value > 0);

            if (numbers.length === 0) {
              core.setFailed('No valid issue numbers were provided.');
              return;
            }

            for (const issueNumber of numbers) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                state: 'closed',
                state_reason: 'completed',
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: [
                  'Closed by OPS — Agent Doctrine Issue Closeout workflow.',
                  '',
                  '- PR #1269: shared agent rules on `main`',
                  '- PR #1284: post-merge remediation on `main`',
                ].join('\n'),
              });
              core.info(`Closed #${issueNumber}`);
            }
