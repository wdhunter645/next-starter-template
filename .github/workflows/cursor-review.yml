name: Cursor PR Review

# Runs on pull requests to provide Cursor-aware review guidance.
# Canonical Cursor rules: docs/ops/ai/CURSOR-RULES.md
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  cursor-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Validate PR scope against Cursor rules
        run: |
          echo "=== Cursor PR Review ==="
          echo "Canonical Cursor rules: docs/ops/ai/CURSOR-RULES.md"
          echo ""

          # Collect changed files in this PR
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "Changed files:"
          echo "$CHANGED"
          echo ""

          # Warn if docs/CURSOR_RULES.md would be introduced (duplicate source of truth)
          if echo "$CHANGED" | grep -q "^docs/CURSOR_RULES\.md$"; then
            echo "::error::docs/CURSOR_RULES.md must not be created. The canonical Cursor rules document is docs/ops/ai/CURSOR-RULES.md."
            exit 1
          fi

          echo "Cursor review gate passed."
