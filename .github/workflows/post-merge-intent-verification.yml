name: Post-Merge Intent Verification

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  verify-merged-pr-intent:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout merged state
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Collect merged PR metadata
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr view "${PR_NUMBER}" --repo "${REPOSITORY}" --json title,body,files,mergeCommit > pr-intent.json
          jq -r '.body // ""' pr-intent.json > pr-body.md
          jq -r '.files[].path' pr-intent.json > pr-files.txt
          jq -r '.title' pr-intent.json > pr-title.txt

      - name: Run verification checks
        id: verify
        run: |
          failures=0

          for required_section in '## Change Summary' '## Acceptance Criteria' '## Risk' '## Validation'; do
            grep -Fq "${required_section}" pr-body.md || failures=$((failures + 1))
          done

          grep -Eqi '\b(TBD|TODO|placeholder|populate)\b' pr-body.md && failures=$((failures + 1))

          while IFS= read -r file; do
            [ -z "${file}" ] && continue
            [ -e "${file}" ] || failures=$((failures + 1))
          done < pr-files.txt

          echo "failures=${failures}" >> $GITHUB_OUTPUT

          if [ "${failures}" -ne 0 ]; then
            exit 1
          fi

      - name: Create remediation issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create --title "Post-Merge Failure: PR #${{ github.event.pull_request.number }}" --body "Post-merge verification failed for PR #${{ github.event.pull_request.number }}. Review workflow logs." --label "post-merge-failure"

      - name: Summary
        run: echo "Post-merge verification completed"
