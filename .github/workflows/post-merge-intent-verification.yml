name: Post-Merge Detection

on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  detect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=$(gh pr list --search "${GITHUB_SHA}" --state merged --json number -q '.[0].number')
          echo "pr=$PR" >> $GITHUB_OUTPUT

      - name: Collect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr view "${{ steps.pr.outputs.pr }}" --json body,files > pr.json
          jq -r '.body // ""' pr.json > body.md
          jq -r '.files[].path' pr.json > files.txt

      - name: Evaluate
        id: verify
        run: |
          failures=0
          grep -Eqi '\b(TODO|TBD|placeholder)\b' body.md && failures=$((failures+1))
          for req in '## Change Summary' '## Acceptance Criteria' '## Risk' '## Validation'; do
            grep -Fq "$req" body.md || failures=$((failures+1))
          done
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ -e "$f" ] || failures=$((failures+1))
          done < files.txt
          echo "failures=$failures" >> $GITHUB_OUTPUT

      - name: Comment
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment ${{ steps.pr.outputs.pr }} --body "Detection failures=${{ steps.verify.outputs.failures }}"

      - name: Fail if needed
        run: |
          if [ "${{ steps.verify.outputs.failures }}" != "0" ]; then
            exit 1
          fi
