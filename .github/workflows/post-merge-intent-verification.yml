name: Post-Merge Detection

on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  detect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
            -H 'Accept: application/vnd.github+json' \
            --jq 'map(select(.state == "closed" and .merged_at != null))[0].number // ""')
          echo "pr=$PR" >> $GITHUB_OUTPUT

      - name: Skip direct pushes without merged PR context
        if: steps.pr.outputs.pr == ''
        run: |
          echo "No merged pull request found for ${GITHUB_SHA}; skipping post-merge PR checks."

      - name: Collect
        if: steps.pr.outputs.pr != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr view "${{ steps.pr.outputs.pr }}" --json body,files > pr.json
          jq -r '.body // ""' pr.json > body.md
          jq -r '.files[].path' pr.json > files.txt

      - name: Evaluate
        if: steps.pr.outputs.pr != ''
        id: verify
        run: |
          failures=0
          grep -Eqi '\b(TODO|TBD|placeholder)\b' body.md && failures=$((failures+1))
          for req in '## CHANGE SUMMARY' '## BUILD / TEST / VERIFICATION' '## ACCEPTANCE CRITERIA' '## REQUIRED PRE-REVIEW SELF-CHECK'; do
            grep -Fq "$req" body.md || failures=$((failures+1))
          done
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ -e "$f" ] || failures=$((failures+1))
          done < files.txt
          echo "failures=$failures" >> $GITHUB_OUTPUT

      - name: Comment
        if: always() && steps.pr.outputs.pr != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          failures="${{ steps.verify.outputs.failures }}"
          [ -n "$failures" ] || failures="unknown"
          gh pr comment "${{ steps.pr.outputs.pr }}" --body "Detection failures=${failures}" || \
            echo "::warning::Unable to post detection comment; continuing because the verification result is enforced separately."

      - name: Sync orchestrator post-merge state
        if: steps.pr.outputs.pr != ''
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.pr }}
          SYNC_ACTION: ${{ steps.verify.outputs.failures == '0' && 'post_merge_success' || 'post_merge_failure' }}
        run: node scripts/orchestrator/sync-pr-state.mjs

      - name: Fail if needed
        if: steps.pr.outputs.pr != ''
        run: |
          if [ "${{ steps.verify.outputs.failures }}" != "0" ]; then
            exit 1
          fi
