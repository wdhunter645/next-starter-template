name: PMO dashboard CI deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pages: write
  id-token: write

concurrency:
  group: pmo-dashboard-pages
  cancel-in-progress: false

env:
  PMO_DASHBOARD_OUT_DIR: site/pmo-dashboard

jobs:
  deploy:
    name: Deploy PMO dashboard to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate dashboard for manual deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/pmo-dashboard/build-dashboard.mjs

      - name: Validate deploy artifact
        run: node scripts/pmo-dashboard/validate-dashboard.mjs site/pmo-dashboard

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/pmo-dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Write deploy summary
        run: |
          echo "## PMO dashboard CI deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "Published dashboard URL: ${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
