name: PMO dashboard CI deploy

on:
  workflow_run:
    workflows: ["PMO dashboard CI build"]
    types: [completed]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pmo-dashboard-pages
  cancel-in-progress: false

env:
  ARTIFACT_NAME: pmo-dashboard

jobs:
  deploy:
    name: Deploy PMO dashboard to GitHub Pages
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download validated dashboard artifact
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: site/pmo-dashboard
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Generate dashboard for manual deploy
        if: github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/pmo-dashboard/build-dashboard.mjs

      - name: Validate deploy artifact
        run: node scripts/pmo-dashboard/validate-dashboard.mjs site/pmo-dashboard

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/pmo-dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Write deploy summary
        run: |
          echo "## PMO dashboard CI deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "Published dashboard URL: ${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
