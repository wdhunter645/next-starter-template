name: Post-Merge PR Body Closeout

on:
  pull_request_target:
    types: [closed]
  push:
    branches: [main]
    paths:
      - scripts/ci/post-merge-closeout/targets-ci-pending.json
      - scripts/ci/post-merge-closeout/targets-remediation-backlog.json
  workflow_dispatch:
    inputs:
      pr_number:
        description: Merged PR number to close out (ignored when run_batch is true)
        required: false
        default: '1239'
      body_file:
        description: Repo-relative path to remediated PR body markdown (manual single-PR mode)
        required: false
        default: scripts/ci/post-merge-closeout/pr-1239-body.md
      skip_body_apply:
        description: Skip body patch (re-validate and sync only)
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      run_batch:
        description: Run batch closeout manifest (manual backfill only)
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      run_all_pending:
        description: Run CI pending + remediation backlog manifests (recommended backfill)
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      closeout_manifest:
        description: Repo-relative manifest path when run_batch is true and run_all_pending is false
        required: false
        default: scripts/ci/post-merge-closeout/targets.json

permissions:
  actions: read
  contents: read
  pull-requests: write
  issues: write

jobs:
  closeout:
    if: |
      (github.event_name == 'pull_request_target' &&
        github.event.pull_request.merged == true &&
        github.event.pull_request.base.ref == 'main') ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request_target' && 'main' || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Batch closeout for all pending CI manifests
        if: |
          (github.event_name == 'workflow_dispatch' && inputs.run_all_pending == 'true') ||
          github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: node scripts/ci/run_post_merge_closeout_all_manifests.mjs

      - name: Batch closeout for manual backfill manifest
        if: github.event_name == 'workflow_dispatch' && inputs.run_batch == 'true' && inputs.run_all_pending != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          CLOSEOUT_MANIFEST: ${{ github.event.inputs.closeout_manifest || 'scripts/ci/post-merge-closeout/targets.json' }}
        run: node scripts/ci/run_batch_post_merge_closeout.mjs

      - name: Upload post-merge batch closeout report
        if: always() && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.run_batch == 'true' || inputs.run_all_pending == 'true')))
        uses: actions/upload-artifact@v4
        with:
          name: post-merge-closeout-report
          path: |
            post-merge-batch-closeout.json
            post-merge-result.json
          if-no-files-found: warn

      - name: Automatic post-merge closeout for merged PR
        if: github.event_name == 'pull_request_target'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_NAME: pull_request_target
          GITHUB_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_PR_MERGED: ${{ github.event.pull_request.merged }}
          EVENT_PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          SKIP_BODY_APPLY: 'true'
        run: node scripts/ci/run_post_merge_closeout.mjs

      - name: Upload automatic post-merge closeout report
        if: always() && github.event_name == 'pull_request_target'
        uses: actions/upload-artifact@v4
        with:
          name: post-merge-closeout-report
          path: |
            post-merge-result.json
            post-merge-result.md
          if-no-files-found: warn

      - name: Manual single-PR closeout
        if: github.event_name == 'workflow_dispatch' && inputs.run_batch != 'true' && inputs.run_all_pending != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_NAME: workflow_dispatch
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          PR_NUMBER: ${{ github.event.inputs.pr_number || '1239' }}
          BODY_FILE: ${{ github.event.inputs.body_file || 'scripts/ci/post-merge-closeout/pr-1239-body.md' }}
          SKIP_BODY_APPLY: ${{ github.event.inputs.skip_body_apply || 'false' }}
        run: node scripts/ci/run_post_merge_closeout.mjs

      - name: Upload manual single-PR closeout report
        if: always() && github.event_name == 'workflow_dispatch' && inputs.run_batch != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: post-merge-closeout-report
          path: |
            post-merge-result.json
            post-merge-result.md
          if-no-files-found: warn
