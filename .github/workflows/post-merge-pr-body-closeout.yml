name: Post-Merge PR Body Closeout

on:
  push:
    branches: [main]
    paths:
      - scripts/ci/post-merge-closeout/targets-active.json
      - scripts/ci/post-merge-closeout/targets-ci-pending-rerun.json
      - scripts/ci/post-merge-closeout/targets-ci-pending.json
      - scripts/ci/post-merge-closeout/targets-remediation-backlog.json
      - scripts/ci/post-merge-closeout/targets-ops-burn-down-wave3b.json
      - scripts/ci/post-merge-closeout/targets-website-completion-1685-closeout.json
      - scripts/ci/post-merge-closeout/targets-2039-public-launch-closeout.json
  workflow_dispatch:
    inputs:
      pr_number:
        description: Merged PR number to close out (ignored when run_batch is true)
        required: false
        default: '1239'
      body_file:
        description: Repo-relative path to remediated PR body markdown (manual single-PR mode)
        required: false
        default: scripts/ci/post-merge-closeout/pr-1239-body.md
      skip_body_apply:
        description: Skip body patch (re-validate and sync only)
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      run_batch:
        description: Run batch closeout manifest (manual backfill only)
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      run_all_pending:
        description: Run CI pending + remediation backlog manifests (recommended backfill)
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      closeout_manifest:
        description: Repo-relative manifest path when run_batch is true and run_all_pending is false
        required: false
        default: scripts/ci/post-merge-closeout/targets.json

permissions:
  actions: read
  contents: read
  pull-requests: write
  issues: write

jobs:
  resolve:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.mode.outputs.mode }}
      manifests_json: ${{ steps.manifests.outputs.manifests_json }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Resolve closeout manifests from push
        if: github.event_name == 'push'
        id: push_manifests
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [ -z "${BEFORE_SHA}" ] || [ "${BEFORE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            CHANGED_PATHS="$(git show --name-only --pretty=format: "${GITHUB_SHA}")"
          else
            CHANGED_PATHS="$(git diff --name-only "${BEFORE_SHA}" "${GITHUB_SHA}")"
          fi
          if echo "${CHANGED_PATHS}" | grep -qx 'scripts/ci/post-merge-closeout/targets-active.json'; then
            echo "Active manifest registry changed; replaying full active manifest set from registry"
            echo "closeout_manifests=" >> "${GITHUB_OUTPUT}"
          else
            printf '%s\n' "${CHANGED_PATHS}" | node scripts/ci/resolve_closeout_manifests_from_push.mjs --stdin-paths
          fi

      - name: Determine closeout execution mode
        id: mode
        env:
          EVENT_NAME: ${{ github.event_name }}
          RUN_ALL_PENDING: ${{ github.event_name == 'workflow_dispatch' && inputs.run_all_pending || 'false' }}
          RUN_BATCH: ${{ github.event_name == 'workflow_dispatch' && inputs.run_batch || 'false' }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "push" ] || [ "${RUN_ALL_PENDING}" = "true" ]; then
            echo "mode=matrix" >> "${GITHUB_OUTPUT}"
          elif [ "${RUN_BATCH}" = "true" ]; then
            echo "mode=single_manifest" >> "${GITHUB_OUTPUT}"
          else
            echo "mode=single_pr" >> "${GITHUB_OUTPUT}"
          fi

      - name: Format manifests for matrix
        id: manifests
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_MANIFESTS: ${{ github.event_name == 'push' && steps.push_manifests.outputs.closeout_manifests || '' }}
          RUN_ALL_PENDING: ${{ github.event_name == 'workflow_dispatch' && inputs.run_all_pending || 'false' }}
          MODE: ${{ steps.mode.outputs.mode }}
        run: |
          set -euo pipefail
          if [ "${MODE}" != "matrix" ]; then
            echo 'manifests_json=[]' >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          if [ "${EVENT_NAME}" = "push" ] && [ -n "${PUSH_MANIFESTS}" ]; then
            MANIFESTS_JSON="$(node --input-type=module -e "
              const list = process.env.PUSH_MANIFESTS.split(',').map((entry) => entry.trim()).filter(Boolean);
              console.log(JSON.stringify(list));
            ")"
          else
            MANIFESTS_JSON="$(node --input-type=module -e "
              import { DEFAULT_MANIFESTS } from './scripts/ci/run_post_merge_closeout_all_manifests.mjs';
              console.log(JSON.stringify(DEFAULT_MANIFESTS));
            ")"
          fi
          echo "manifests_json=${MANIFESTS_JSON}" >> "${GITHUB_OUTPUT}"

  closeout-shard:
    needs: resolve
    if: needs.resolve.outputs.mode == 'matrix' && needs.resolve.outputs.manifests_json != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        manifest: ${{ fromJson(needs.resolve.outputs.manifests_json) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run closeout manifest shard
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          CLOSEOUT_MANIFEST: ${{ matrix.manifest }}
        run: node scripts/ci/run_batch_post_merge_closeout.mjs

      - name: Stage shard report
        if: always()
        run: |
          set -euo pipefail
          SHARD_FILE="closeout-shard-${{ strategy.job-index }}.json"
          if [ -f post-merge-batch-closeout.json ]; then
            cp post-merge-batch-closeout.json "${SHARD_FILE}"
          else
            printf '%s\n' '{"status":"failure","failed_phase":"shard","results":[],"error":{"phase":"shard","message":"missing shard report"}}' > "${SHARD_FILE}"
          fi

      - name: Upload manifest shard report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: closeout-shard-${{ strategy.job-index }}
          path: closeout-shard-${{ strategy.job-index }}.json
          if-no-files-found: warn

  aggregate-closeout:
    needs: [resolve, closeout-shard]
    if: always() && needs.resolve.outputs.mode == 'matrix' && needs.resolve.outputs.manifests_json != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download manifest shard reports
        uses: actions/download-artifact@v4
        with:
          pattern: closeout-shard-*
          path: closeout-shards
          merge-multiple: true

      - name: Aggregate closeout shard reports
        id: aggregate
        env:
          CLOSEOUT_AGGREGATE_DIR: closeout-shards
        run: node scripts/ci/run_post_merge_closeout_all_manifests.mjs

      - name: Emit closeout backlog metrics
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/ci/emit_closeout_backlog_metrics.mjs

      - name: Commit rate-limit rerun manifest updates
        if: steps.aggregate.outputs.rerun_manifest_changed == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/ci/post-merge-closeout/targets-ci-pending-rerun.json
          git commit -m "chore(ci): queue rate-limited closeout targets for rerun [skip ci]"
          git push

      - name: Upload aggregated post-merge batch closeout report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-merge-batch-closeout-report
          path: |
            post-merge-batch-closeout.json
            post-merge-result.json
          if-no-files-found: warn

  closeout-legacy:
    needs: resolve
    if: needs.resolve.outputs.mode != 'matrix'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Batch closeout for manual backfill manifest
        if: needs.resolve.outputs.mode == 'single_manifest'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          CLOSEOUT_MANIFEST: ${{ github.event.inputs.closeout_manifest || 'scripts/ci/post-merge-closeout/targets.json' }}
        run: node scripts/ci/run_batch_post_merge_closeout.mjs

      - name: Emit closeout backlog metrics
        if: always() && needs.resolve.outputs.mode == 'single_manifest'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/ci/emit_closeout_backlog_metrics.mjs

      - name: Manual single-PR closeout
        if: needs.resolve.outputs.mode == 'single_pr' && inputs.run_batch != 'true' && inputs.run_all_pending != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_NAME: workflow_dispatch
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          PR_NUMBER: ${{ github.event.inputs.pr_number || '1239' }}
          BODY_FILE: ${{ github.event.inputs.body_file || 'scripts/ci/post-merge-closeout/pr-1239-body.md' }}
          SKIP_BODY_APPLY: ${{ github.event.inputs.skip_body_apply || 'false' }}
        run: node scripts/ci/run_post_merge_closeout.mjs

      - name: Upload post-merge batch closeout report
        if: always() && needs.resolve.outputs.mode == 'single_manifest'
        uses: actions/upload-artifact@v4
        with:
          name: post-merge-batch-closeout-report
          path: |
            post-merge-batch-closeout.json
            post-merge-result.json
          if-no-files-found: warn

      - name: Upload manual single-PR closeout report
        if: always() && needs.resolve.outputs.mode == 'single_pr' && inputs.run_batch != 'true' && inputs.run_all_pending != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: post-merge-single-closeout-report
          path: |
            post-merge-result.json
            post-merge-result.md
          if-no-files-found: warn
