name: GATE — Intent Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: write
  contents: read

jobs:
  label-intent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-assign intent label
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('.github/intent-labeler.json', 'utf8'));
            const prNumber = context.payload.pull_request.number;

            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const changedFiles = files.map(f => f.filename);

            function isAllowed(filepath, intentConfig) {
              for (const deny of (intentConfig.deny_prefixes || [])) {
                if (filepath.startsWith(deny)) return false;
              }
              for (const allow of (intentConfig.allow_prefixes || [])) {
                if (filepath.startsWith(allow)) return true;
              }
              return false;
            }

            const intentOrder = ['docs-only', 'infra', 'platform', 'change-ops', 'feature', 'codex'];
            let matchedIntent = null;

            for (const intentName of intentOrder) {
              const intentConfig = config.intents[intentName];
              const allFilesMatch = changedFiles.every(file => isAllowed(file, intentConfig));
              if (allFilesMatch) {
                matchedIntent = intentName;
                break;
              }
            }

            if (!matchedIntent) {
              matchedIntent = 'infra';
              console.log('Fallback intent applied: infra');
            }

            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const currentLabelNames = currentLabels.map(l => l.name);
            const intentLabels = Object.keys(config.intents);
            const existingIntentLabels = currentLabelNames.filter(l => intentLabels.includes(l));

            for (const label of existingIntentLabels) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name: label,
              });
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: [matchedIntent],
            });

            console.log(`Applied intent label: ${matchedIntent}`);
