name: LGFC Orchestrator - queue_advance

on:
  workflow_dispatch:
  issues:
    types: [closed, labeled, reopened, unlabeled]

permissions:
  contents: read
  issues: write

jobs:
  advance:
    runs-on: ubuntu-latest
    steps:
      - name: Advance to next queued task after successful completion
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const blockingStatuses = [
              'status:assigned',
              'status:in-progress',
              'status:pr-open',
              'status:validation',
              'status:blocked',
              'status:failed',
              'status:post-merge-verify'
            ];

            for (const statusLabel of blockingStatuses) {
              const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                owner,
                repo,
                state: 'open',
                labels: statusLabel,
                per_page: 100
              });
              const realIssues = openIssues.filter(i => !i.pull_request);
              if (realIssues.length > 0) {
                core.info(`Queue advancement halted due to ${statusLabel}.`);
                return;
              }
            }

            const queuedIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              labels: 'status:queued',
              per_page: 100
            });
            const queued = queuedIssues
              .filter(i => !i.pull_request)
              .sort((a, b) => new Date(a.created_at).getTime() - new Date(b.created_at).getTime());

            if (queued.length === 0) {
              core.info('No queued issues available to advance.');
              return;
            }

            const nextIssue = queued[0];
            const labels = (nextIssue.labels || []).map(l => l.name);
            const nonStatus = labels.filter(name => !name.startsWith('status:'));
            const builderFromType = labels.includes('type:website') ? 'builder:cursor' : 'builder:codex';
            const builder = labels.find(name => name.startsWith('builder:')) || builderFromType;

            await github.rest.issues.setLabels({
              owner,
              repo,
              issue_number: nextIssue.number,
              labels: [...nonStatus.filter(name => !name.startsWith('builder:')), builder, 'status:assigned']
            });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: nextIssue.number,
              body: `LGFC Orchestrator: queue advanced. Assigned next queued Issue to \`${builder}\`.`
            });
