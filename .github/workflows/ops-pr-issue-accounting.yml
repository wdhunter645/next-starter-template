name: GATE — PR Issue Accounting

on:
  pull_request_target:
    types: [opened, reopened, edited, synchronize, closed]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  pr-issue-accounting:
    runs-on: ubuntu-latest
    concurrency:
      group: ops-pr-issue-accounting-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout workflow parser helpers
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Normalize and verify Issue-first pull request accounting
        uses: actions/github-script@v7
        with:
          script: |
            const {
              issueRefsFromTrustedSources,
              normalizeIssueLine,
            } = require('./scripts/ci/pr-issue-accounting-parser.js');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;
            const action = context.payload.action;

            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            const prBody = pr.body || '';
            const headRef = pr.head?.ref || '';

            async function commentOnce(marker, body) {
              try {
                const comments = await github.paginate(github.rest.issues.listComments, {
                  owner,
                  repo,
                  issue_number: prNumber,
                  per_page: 100,
                });
                const existing = (comments || []).find((comment) => (comment.body || '').includes(marker));
                const commentBody = `${marker}\n\n${body}`;
                if (existing) {
                  await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: commentBody });
                } else {
                  await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: commentBody });
                }
              } catch (error) {
                core.warning(`Unable to write PR accounting comment: ${error.message}`);
              }
            }

            const marker = '<!-- ops-pr-issue-accounting -->';
            const sourceRefs = issueRefsFromTrustedSources(prBody, headRef, owner, repo);
            const discoveredRefs = sourceRefs.refs;
            const invalidRefs = sourceRefs.invalidRefs;
            const uniqueSourceIssues = [...new Set(discoveredRefs.map((ref) => ref.issueNumber))];

            if (invalidRefs.length > 0 || uniqueSourceIssues.length !== 1) {
              await commentOnce(
                marker,
                [
                  'OPS PR Issue Accounting failed.',
                  '',
                  'Repository policy is Issue-first only.',
                  '',
                  'The workflow could not determine exactly one same-repository source Issue from trusted PR surfaces.',
                  '',
                  'Accepted source surfaces:',
                  '- Existing primary PR body line such as `- **Issue:** #123`',
                  '- Compatible primary PR body variants such as `- **Issue**: #123`',
                  '- Semantic primary PR body variants such as `Issue #123` or `Related Issue: #123`',
                  '- Same-repository closing keyword references such as `Closes #123`',
                  '- Branch names containing an issue number such as `issue-123-example` when no body source Issue exists',
                  '',
                  `Detected source Issues: ${uniqueSourceIssues.length ? uniqueSourceIssues.map((issue) => `#${issue}`).join(', ') : 'none'}`,
                  `Detected sources: ${discoveredRefs.length ? discoveredRefs.map((ref) => `${ref.source}:#${ref.issueNumber}`).join(', ') : 'none'}`,
                  `Invalid issue references: ${invalidRefs.length ? invalidRefs.map((ref) => `${ref.source}:${ref.ref}`).join(', ') : 'none'}`,
                  '',
                  'Add or correct the source Issue reference, then edit or synchronize the PR to rerun this workflow.',
                ].join('\n')
              );
              core.setFailed(`PR #${prNumber} must resolve to exactly one valid same-repository source Issue. Found unique issues: ${uniqueSourceIssues.length}; invalid refs: ${invalidRefs.length}`);
              return;
            }

            const sourceIssueNumber = uniqueSourceIssues[0];
            let sourceIssue;
            try {
              const { data } = await github.rest.issues.get({ owner, repo, issue_number: sourceIssueNumber });
              sourceIssue = data;
            } catch (error) {
              await commentOnce(marker, `OPS PR Issue Accounting failed. Source Issue #${sourceIssueNumber} could not be loaded.`);
              core.setFailed(`Source Issue #${sourceIssueNumber} could not be loaded: ${error.message}`);
              return;
            }

            if (sourceIssue.pull_request) {
              await commentOnce(marker, `OPS PR Issue Accounting failed. #${sourceIssueNumber} is a pull request, not an Issue.`);
              core.setFailed(`#${sourceIssueNumber} is a pull request, not an Issue.`);
              return;
            }

            if (sourceIssue.state !== 'open' && action !== 'closed') {
              await commentOnce(marker, `OPS PR Issue Accounting failed. Source Issue #${sourceIssueNumber} is ${sourceIssue.state}; PRs must start from an open Issue.`);
              core.setFailed(`Source Issue #${sourceIssueNumber} is not open.`);
              return;
            }

            const normalizedBody = normalizeIssueLine(prBody, sourceIssueNumber);
            if (normalizedBody !== prBody && action !== 'closed') {
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: prNumber,
                body: normalizedBody,
              });
            }

            await commentOnce(
              marker,
              [
                'OPS PR Issue Accounting passed.',
                '',
                `Primary source Issue: #${sourceIssueNumber}`,
                `Source Issue state: ${sourceIssue.state}`,
                `Detected source surfaces: ${discoveredRefs.map((ref) => `${ref.source}:#${ref.issueNumber}`).join(', ')}`,
                normalizedBody !== prBody && action !== 'closed'
                  ? 'PR body normalized to canonical Issue line.'
                  : 'PR body already contained canonical or compatible Issue accounting.',
                'No synthetic tracker Issue was created.',
              ].join('\n')
            );

            core.info(`PR #${prNumber} is issue-first with source Issue #${sourceIssueNumber}.`);
