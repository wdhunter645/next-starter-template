name: OPS — PR Issue Accounting

on:
  pull_request_target:
    types: [opened, reopened, edited, synchronize, closed]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  pr-issue-accounting:
    runs-on: ubuntu-latest
    concurrency:
      group: ops-pr-issue-accounting-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Normalize and verify Issue-first pull request accounting
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;
            const action = context.payload.action;

            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            const prBody = pr.body || '';
            const headRef = pr.head?.ref || '';

            function issueUrlBelongsToCurrentRepo(issueUrl) {
              try {
                const url = new URL(issueUrl);
                const parts = url.pathname.split('/').filter(Boolean);
                return url.hostname.toLowerCase() === 'github.com'
                  && parts.length === 4
                  && parts[0].toLowerCase() === owner.toLowerCase()
                  && parts[1].toLowerCase() === repo.toLowerCase()
                  && parts[2] === 'issues'
                  && /^\d+$/.test(parts[3]);
              } catch (_error) {
                return false;
              }
            }

            function issueNumberFromRef(ref) {
              const value = (ref || '').trim().replace(/[).,;]+$/g, '');
              const local = value.match(/^#(\d+)$/);
              if (local) return Number(local[1]);
              if (!issueUrlBelongsToCurrentRepo(value)) return null;
              const parts = new URL(value).pathname.split('/').filter(Boolean);
              return Number(parts[3]);
            }

            function pushUnique(refs, issueNumber, source) {
              if (!issueNumber || Number.isNaN(issueNumber)) return;
              refs.push({ issueNumber, source });
            }

            function issueRefsFromBody(body) {
              const refs = [];
              const lines = (body || '').split('\n');
              for (const line of lines) {
                if (/OPS\s+Tracker/i.test(line)) continue;
                if (/Umbrella\s+Tracker/i.test(line)) continue;

                const primary = line.match(/^\s*-?\s*(?:\*\*)?Issue(?::|\*\*\s*:|\*\*:)\s*(#\d+|https:\/\/github\.com\/[^\s)]+\/[^\s)]+\/issues\/\d+\/?)/i);
                if (primary) {
                  pushUnique(refs, issueNumberFromRef(primary[1]), 'primary-body-line');
                  continue;
                }

                const closing = line.match(/\b(?:closes|close|closed|fixes|fix|fixed|resolves|resolve|resolved)\s+(#\d+|https:\/\/github\.com\/[^\s)]+\/[^\s)]+\/issues\/\d+\/?)/i);
                if (closing) {
                  pushUnique(refs, issueNumberFromRef(closing[1]), 'closing-keyword-body-line');
                }
              }
              return refs;
            }

            function issueRefsFromBranch(ref) {
              const refs = [];
              const patterns = [
                /(?:^|[-_/])issue[-_/]?(\d+)(?:$|[-_/])/i,
                /(?:^|[-_/])(\d{3,6})(?:[-_/][A-Za-z]|$)/,
              ];
              for (const pattern of patterns) {
                const match = (ref || '').match(pattern);
                if (match) {
                  pushUnique(refs, Number(match[1]), 'branch-name');
                  break;
                }
              }
              return refs;
            }

            function canonicalIssueLine(issueNumber) {
              return `- **Issue:** #${issueNumber}`;
            }

            function normalizeIssueLine(body, issueNumber) {
              const canonical = canonicalIssueLine(issueNumber);
              const lines = (body || '').split('\n');
              let replaced = false;
              const normalized = lines.map((line) => {
                if (/OPS\s+Tracker/i.test(line) || /Umbrella\s+Tracker/i.test(line)) return line;
                if (/^\s*-?\s*(?:\*\*)?Issue(?::|\*\*\s*:|\*\*:)\s*(#\d+|https:\/\/github\.com\/[^\s)]+\/[^\s)]+\/issues\/\d+\/?)/i.test(line)) {
                  if (!replaced) {
                    replaced = true;
                    return canonical;
                  }
                  return null;
                }
                return line;
              }).filter((line) => line !== null);

              if (!replaced) {
                return `${canonical}\n\n${body || ''}`.trimEnd();
              }
              return normalized.join('\n').trimEnd();
            }

            async function commentOnce(marker, body) {
              try {
                const comments = await github.paginate(github.rest.issues.listComments, {
                  owner,
                  repo,
                  issue_number: prNumber,
                  per_page: 100,
                });
                const existing = (comments || []).find((comment) => (comment.body || '').includes(marker));
                const commentBody = `${marker}\n\n${body}`;
                if (existing) {
                  await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: commentBody });
                } else {
                  await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: commentBody });
                }
              } catch (error) {
                core.warning(`Unable to write PR accounting comment: ${error.message}`);
              }
            }

            const marker = '<!-- ops-pr-issue-accounting -->';
            const discoveredRefs = [
              ...issueRefsFromBody(prBody),
              ...issueRefsFromBranch(headRef),
            ];
            const uniqueSourceIssues = [...new Set(discoveredRefs.map((ref) => ref.issueNumber))];

            if (uniqueSourceIssues.length !== 1) {
              await commentOnce(
                marker,
                [
                  'OPS PR Issue Accounting failed.',
                  '',
                  'Repository policy is Issue-first only.',
                  '',
                  'The workflow could not determine exactly one same-repository source Issue from trusted PR surfaces.',
                  '',
                  'Accepted source surfaces:',
                  '- Existing primary PR body line such as `- **Issue:** #123`',
                  '- Compatible primary PR body variants such as `- **Issue**: #123`',
                  '- Same-repository closing keyword references such as `Closes #123`',
                  '- Branch names containing an issue number such as `issue-123-example`',
                  '',
                  `Detected source Issues: ${uniqueSourceIssues.length ? uniqueSourceIssues.map((issue) => `#${issue}`).join(', ') : 'none'}`,
                  `Detected sources: ${discoveredRefs.length ? discoveredRefs.map((ref) => `${ref.source}:#${ref.issueNumber}`).join(', ') : 'none'}`,
                  '',
                  'Add or correct the source Issue reference, then edit or synchronize the PR to rerun this workflow.',
                ].join('\n')
              );
              core.setFailed(`PR #${prNumber} must resolve to exactly one source Issue. Found unique issues: ${uniqueSourceIssues.length}`);
              return;
            }

            const sourceIssueNumber = uniqueSourceIssues[0];
            let sourceIssue;
            try {
              const { data } = await github.rest.issues.get({ owner, repo, issue_number: sourceIssueNumber });
              sourceIssue = data;
            } catch (error) {
              await commentOnce(marker, `OPS PR Issue Accounting failed. Source Issue #${sourceIssueNumber} could not be loaded.`);
              core.setFailed(`Source Issue #${sourceIssueNumber} could not be loaded: ${error.message}`);
              return;
            }

            if (sourceIssue.pull_request) {
              await commentOnce(marker, `OPS PR Issue Accounting failed. #${sourceIssueNumber} is a pull request, not an Issue.`);
              core.setFailed(`#${sourceIssueNumber} is a pull request, not an Issue.`);
              return;
            }

            if (sourceIssue.state !== 'open' && action !== 'closed') {
              await commentOnce(marker, `OPS PR Issue Accounting failed. Source Issue #${sourceIssueNumber} is ${sourceIssue.state}; PRs must start from an open Issue.`);
              core.setFailed(`Source Issue #${sourceIssueNumber} is not open.`);
              return;
            }

            const normalizedBody = normalizeIssueLine(prBody, sourceIssueNumber);
            if (normalizedBody !== prBody && action !== 'closed') {
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: prNumber,
                body: normalizedBody,
              });
            }

            await commentOnce(
              marker,
              [
                'OPS PR Issue Accounting passed.',
                '',
                `Primary source Issue: #${sourceIssueNumber}`,
                `Source Issue state: ${sourceIssue.state}`,
                `Detected source surfaces: ${discoveredRefs.map((ref) => `${ref.source}:#${ref.issueNumber}`).join(', ')}`,
                normalizedBody !== prBody && action !== 'closed'
                  ? 'PR body normalized to canonical Issue line.'
                  : 'PR body already contained canonical or compatible Issue accounting.',
                'No synthetic tracker Issue was created.',
              ].join('\n')
            );

            core.info(`PR #${prNumber} is issue-first with source Issue #${sourceIssueNumber}.`);
