name: OPS — PR Issue Accounting

on:
  pull_request_target:
    types: [opened, reopened, edited, synchronize, closed]

permissions:
  issues: write
  pull-requests: read
  contents: read

jobs:
  pr-issue-accounting:
    runs-on: ubuntu-latest
    concurrency:
      group: ops-pr-issue-accounting-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Enforce Issue-first pull request accounting
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;
            const action = context.payload.action;

            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            const prBody = pr.body || '';

            function issueUrlBelongsToCurrentRepo(issueUrl) {
              try {
                const url = new URL(issueUrl);
                const parts = url.pathname.split('/').filter(Boolean);
                return url.hostname.toLowerCase() === 'github.com'
                  && parts.length === 4
                  && parts[0].toLowerCase() === owner.toLowerCase()
                  && parts[1].toLowerCase() === repo.toLowerCase()
                  && parts[2] === 'issues'
                  && /^\d+$/.test(parts[3]);
              } catch (e) {
                return false;
              }
            }

            function issueNumberFromRef(ref) {
              const value = (ref || '').trim().replace(/[).,;]+$/g, '');
              const local = value.match(/^#(\d+)$/);
              if (local) return Number(local[1]);
              if (!issueUrlBelongsToCurrentRepo(value)) return null;
              const parts = new URL(value).pathname.split('/').filter(Boolean);
              return Number(parts[3]);
            }

            function sourceIssueNumbers(body) {
              const numbers = new Set();
              const lines = (body || '').split('\n');
              for (const line of lines) {
                if (/OPS\s+Tracker/i.test(line)) continue;
                if (/Umbrella\s+Tracker/i.test(line)) continue;
                const match = line.match(/^\s*-?\s*(?:\*\*)?Issue(?:\*\*)?\s*:\s*(#\d+|https:\/\/github\.com\/[^\s)]+\/[^\s)]+\/issues\/\d+\/?)/i);
                if (!match) continue;
                const issueNumber = issueNumberFromRef(match[1]);
                if (issueNumber) numbers.add(issueNumber);
              }
              return [...numbers];
            }

            async function commentOnce(marker, body) {
              const comments = await github.rest.issues.listComments({ owner, repo, issue_number: prNumber, per_page: 100 });
              const existing = (comments.data || []).find((comment) => (comment.body || '').includes(marker));
              const commentBody = `${marker}\n\n${body}`;
              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: commentBody });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: commentBody });
              }
            }

            const marker = '<!-- ops-pr-issue-accounting -->';
            const sourceIssues = sourceIssueNumbers(prBody);

            if (sourceIssues.length !== 1) {
              await commentOnce(
                marker,
                [
                  'OPS PR Issue Accounting failed.',
                  '',
                  'Repository policy is Issue-first only.',
                  '',
                  'Every PR must include exactly one primary source Issue line:',
                  '',
                  '- **Issue:** #123',
                  '',
                  'OPS Tracker and Umbrella Tracker links are allowed as secondary context, but they are not task authority.',
                  '',
                  `Detected primary source Issues: ${sourceIssues.length ? sourceIssues.map((issue) => `#${issue}`).join(', ') : 'none'}`,
                  '',
                  'Create or select an open Issue first, then create the PR from that Issue.',
                ].join('\n')
              );
              core.setFailed(`PR #${prNumber} must have exactly one primary source Issue. Found: ${sourceIssues.length}`);
              return;
            }

            const sourceIssueNumber = sourceIssues[0];
            let sourceIssue;
            try {
              const { data } = await github.rest.issues.get({ owner, repo, issue_number: sourceIssueNumber });
              sourceIssue = data;
            } catch (error) {
              await commentOnce(marker, `OPS PR Issue Accounting failed. Source Issue #${sourceIssueNumber} could not be loaded.`);
              core.setFailed(`Source Issue #${sourceIssueNumber} could not be loaded: ${error.message}`);
              return;
            }

            if (sourceIssue.pull_request) {
              await commentOnce(marker, `OPS PR Issue Accounting failed. #${sourceIssueNumber} is a pull request, not an Issue.`);
              core.setFailed(`#${sourceIssueNumber} is a pull request, not an Issue.`);
              return;
            }

            if (sourceIssue.state !== 'open' && action !== 'closed') {
              await commentOnce(marker, `OPS PR Issue Accounting failed. Source Issue #${sourceIssueNumber} is ${sourceIssue.state}; PRs must start from an open Issue.`);
              core.setFailed(`Source Issue #${sourceIssueNumber} is not open.`);
              return;
            }

            await commentOnce(
              marker,
              [
                'OPS PR Issue Accounting passed.',
                '',
                `Primary source Issue: #${sourceIssueNumber}`,
                `Source Issue state: ${sourceIssue.state}`,
                'No synthetic tracker Issue was created.',
              ].join('\n')
            );

            core.info(`PR #${prNumber} is issue-first with source Issue #${sourceIssueNumber}.`);
