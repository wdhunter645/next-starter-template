name: LGFC Orchestrator - post_merge_verify

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  verify:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  finalize:
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ always() && github.event.pull_request.merged == true }}
    steps:
      - name: Update linked Issue with post-merge verification status
        uses: actions/github-script@v7
        env:
          VERIFY_RESULT: ${{ needs.verify.result }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const matches = [...body.matchAll(/(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#(\d+)/gi)];
            const issueNumbers = [...new Set(matches.map(m => Number(m[3])))];
            const passed = process.env.VERIFY_RESULT === 'success';

            for (const issueNumber of issueNumbers) {
              const issue = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
              const labels = (issue.data.labels || []).map(l => l.name);
              const keep = labels.filter(name => !name.startsWith('status:'));
              const nextStatus = passed ? 'status:complete' : 'status:failed';
              await github.rest.issues.setLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: [...keep, nextStatus]
              });

              if (passed) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  body: `LGFC Orchestrator: post-merge verify passed.\nPR: ${pr.html_url}`
                });
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  state: 'closed'
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  body: `LGFC Orchestrator: post-merge verify failed.\nPR: ${pr.html_url}`
                });

                const recovery = await github.rest.issues.create({
                  owner,
                  repo,
                  title: `[Recovery] Post-merge verification failed for Issue #${issueNumber}`,
                  body: [
                    `Recovery task created due to failed post-merge verification for Issue #${issueNumber}.`,
                    `Source PR: ${pr.html_url}`,
                    '',
                    'Required action:',
                    '- Fix verification failure inside orchestrator implementation scope.'
                  ].join('\n'),
                  labels: ['status:queued', 'type:recovery', 'builder:copilot']
                });

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  body: `LGFC Orchestrator: recovery Issue created due to failed verification: ${recovery.data.html_url}`
                });
              }
            }

            if (!passed) {
              core.setFailed('Post-merge verification failed.');
            }
