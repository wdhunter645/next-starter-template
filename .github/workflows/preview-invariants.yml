name: Preview Invariants (Cloudflare Pages)

# TEMP DISABLED (manual only): This workflow is not production-configured and is currently disruptive/noisy. Re-enable only when fully configured and correctly placed in the ops pipeline.
on:
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: read
  checks: read
  deployments: read

concurrency:
  group: preview-invariants-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  preview_invariants:
    name: Preview Invariants (deployed preview)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Playwright browsers
        run: |
          npx playwright install --with-deps

      - name: Resolve Cloudflare Pages preview URL
        id: pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          node scripts/ci/get_pages_preview_url.mjs > /tmp/preview_url.txt
          PREVIEW_URL="$(cat /tmp/preview_url.txt | tr -d '\r\n' | sed -E 's/[[:space:]]+$//')"
          if [ -z "$PREVIEW_URL" ]; then
            echo "ERROR: Could not resolve Cloudflare Pages preview URL."
            exit 1
          fi
          echo "Preview URL: $PREVIEW_URL"
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

      - name: Run Playwright invariants against deployed preview
        env:
          BASE_URL: ${{ steps.pages.outputs.preview_url }}
        run: |
          npx playwright test --reporter=html

      - name: Upload Playwright report (always)
        if: always()
        uses: actions/upload-artifact@e69ef54c2d3f3b2f5a1cdbcc5dfdf2f72c8e2d6c
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: warn
