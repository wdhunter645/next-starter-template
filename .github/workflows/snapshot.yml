name: OPS — Snapshot Backup

on:
  schedule:
    # Run daily at 08:00 UTC (~3-4AM Eastern depending on DST)
    - cron: '0 8 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/snapshot.yml'
      - 'scripts/snapshot_repo.sh'
      - 'scripts/cf_pages_snapshot.sh'
      - 'snapshots/**'
      - 'docs/**'

permissions:
  contents: read
  issues: write

jobs:
  repo_snapshot:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run repo snapshot script
        run: bash scripts/snapshot_repo.sh

      - name: Upload repo snapshot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: repo-snapshot
          path: |
            snapshots/repo-snapshot-*.json
            snapshots/_smoketest.txt
          retention-days: 90

      - name: Write repo snapshot summary
        if: always()
        run: |
          {
            echo "## OPS — Snapshot Backup"
            echo "- Repo snapshot job: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Node for repo escalation
        if: failure()
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Open repo snapshot escalation issue
        if: failure()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OPS_ESCALATION_WORKFLOW: OPS — Snapshot Backup
          OPS_ESCALATION_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          OPS_ESCALATION_DETAILS: Repository snapshot script failed. Rollback evidence may be incomplete until snapshot recovery succeeds.
          OPS_ESCALATION_LABELS: ops-runtime-failure,snapshot-failure
        run: node scripts/ci/ops_runtime_escalation.mjs

  cloudflare_pages_snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Cloudflare Pages snapshot script
        id: cf_snapshot
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_PAGES_PROJECT: ${{ secrets.CF_PAGES_PROJECT }}
        run: bash scripts/cf_pages_snapshot.sh

      - name: Upload Cloudflare Pages snapshot artifacts
        if: steps.cf_snapshot.outputs.snapshot_created == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-pages-snapshot
          path: |
            snapshots/cloudflare/cf-project-*.json
            snapshots/cloudflare/cf-domains-*.json
            snapshots/cloudflare/cf-deployments-*.json
            snapshots/cloudflare/_smoketest.txt
            snapshots/cloudflare/README.md
          retention-days: 90

      - name: Write Cloudflare snapshot summary
        if: always()
        run: |
          {
            echo "## OPS — Snapshot Backup"
            echo "- Cloudflare snapshot job: ${{ job.status }}"
            echo "- Snapshot created: ${{ steps.cf_snapshot.outputs.snapshot_created || 'unknown' }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Node for Cloudflare escalation
        if: failure()
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Open Cloudflare snapshot escalation issue
        if: failure()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OPS_ESCALATION_WORKFLOW: OPS — Snapshot Backup
          OPS_ESCALATION_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          OPS_ESCALATION_DETAILS: Cloudflare Pages snapshot script failed. Deployment rollback evidence may be incomplete.
          OPS_ESCALATION_LABELS: ops-runtime-failure,snapshot-failure
        run: node scripts/ci/ops_runtime_escalation.mjs
