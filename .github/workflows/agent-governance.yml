name: Agent Governance

on:
  pull_request:
    paths:
      - AGENTS.md
      - .agents/**
      - governance/ai/**
      - ops/ai/**
      - .github/workflows/agent-governance.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node .agents/checks/agent-governance-check.mjs .
