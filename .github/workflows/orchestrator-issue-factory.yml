name: Orchestrator — Issue Factory

on:
  push:
    branches:
      - main
    paths:
      - 'docs/ops/implementation-plans/**'

permissions:
  contents: read
  issues: write

jobs:
  create-issues:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (none required)
        run: npm --version

      - name: Run issue factory
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/orchestrator/create-issues.mjs
