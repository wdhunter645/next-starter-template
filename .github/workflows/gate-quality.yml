name: GATE — Quality Checks

on:
  pull_request:
  push:
  workflow_dispatch: {}

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Check repo structure
        run: npm run check:structure

      - name: Enforce backend reference guard
        run: bash scripts/ci/no_"supa""base"_guard.sh

      - name: Block tracked ZIP files
        run: bash scripts/ci/check_no_tracked_zips.sh

      - name: Block ZIP taint in PR history
        if: ${{ github.event_name == 'pull_request' }}
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash scripts/ci/verify_zip_history_pr.sh

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
