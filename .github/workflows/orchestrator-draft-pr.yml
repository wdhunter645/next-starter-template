name: Orchestrator — Draft PR Creator

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: orchestrator-pr-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  create-draft-pr:
    if: contains(github.event.issue.labels.*.name, 'orchestrator') && contains(github.event.issue.labels.*.name, 'status:queued')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run draft PR creator
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          BASE_BRANCH: main
        run: node scripts/orchestrator/create-draft-pr.mjs
