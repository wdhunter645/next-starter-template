name: DIATAXIS Post-Merge Validation

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  validate:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout merged state
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Collect merged DIATAXIS files
        id: changed
        run: |
          git diff --name-only \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.merge_commit_sha }}" \
            | grep -E '^(docs/tutorials|docs/how-to|docs/reference|docs/explanation)/.*\.md$' \
            | tee diataxis_changed_files.txt || true

      - name: Audit merged DIATAXIS docs
        id: audit
        continue-on-error: true
        env:
          DIATAXIS_CHANGED_FILES_FILE: diataxis_changed_files.txt
        run: node scripts/ci/post_merge_diataxis_audit.mjs

      - name: Upload DIATAXIS evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-merge-diataxis-evidence
          path: |
            post-merge-diataxis.json
            post-merge-diataxis.md
            diataxis_changed_files.txt
          if-no-files-found: warn

      - name: Comment DIATAXIS evidence
        if: always() && hashFiles('post-merge-diataxis.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "$(printf '%s\n\n%s' '<!-- post-merge-diataxis-evidence -->' "$(cat post-merge-diataxis.md)")" || true
