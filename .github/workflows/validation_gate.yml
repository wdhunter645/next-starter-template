name: LGFC Orchestrator - validation_gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  detect-tools:
    runs-on: ubuntu-latest
    outputs:
      semgrep_enabled: ${{ steps.detect.outputs.semgrep_enabled }}
      deepwiki_enabled: ${{ steps.detect.outputs.deepwiki_enabled }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        run: |
          if [ -f .semgrep.yml ] || [ -f .semgrep.yaml ]; then
            echo "semgrep_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "semgrep_enabled=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -f .github/deepwiki.yml ] || [ -f .github/deepwiki.yaml ]; then
            echo "deepwiki_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "deepwiki_enabled=false" >> "$GITHUB_OUTPUT"
          fi

  ci:
    runs-on: ubuntu-latest
    needs: detect-tools
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  semgrep:
    runs-on: ubuntu-latest
    needs: detect-tools
    if: ${{ needs.detect-tools.outputs.semgrep_enabled == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - run: |
          python -m pip install --upgrade pip
          pip install semgrep
          semgrep scan --config auto

  deepwiki:
    runs-on: ubuntu-latest
    needs: detect-tools
    if: ${{ needs.detect-tools.outputs.deepwiki_enabled == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "DeepWiki configuration detected."
          echo "Integrate DeepWiki CLI/check command here when configured."

  lgfc-custom-gates:
    runs-on: ubuntu-latest
    needs: detect-tools
    steps:
      - uses: actions/checkout@v4
      - run: |
          if [ -x ./scripts/ci/docs_check_headers.sh ]; then
            ./scripts/ci/docs_check_headers.sh .
          else
            echo "docs_check_headers.sh not configured; skipping."
          fi
          if [ -x ./scripts/ci/docs_canonical_hashes_verify.sh ]; then
            ./scripts/ci/docs_canonical_hashes_verify.sh .
          else
            echo "docs_canonical_hashes_verify.sh not configured; skipping."
          fi

  report:
    runs-on: ubuntu-latest
    needs: [ci, semgrep, deepwiki, lgfc-custom-gates]
    if: ${{ always() }}
    steps:
      - name: Report validation to PR and Issue
        uses: actions/github-script@v7
        env:
          CI_RESULT: ${{ needs.ci.result }}
          SEMGREP_RESULT: ${{ needs.semgrep.result || 'skipped' }}
          DEEPWIKI_RESULT: ${{ needs.deepwiki.result || 'skipped' }}
          CUSTOM_RESULT: ${{ needs.lgfc-custom-gates.result }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const matches = [...body.matchAll(/(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#(\d+)/gi)];
            const issueNumbers = [...new Set(matches.map(m => Number(m[3])))];
            const results = {
              ci: process.env.CI_RESULT,
              semgrep: process.env.SEMGREP_RESULT || 'skipped',
              deepwiki: process.env.DEEPWIKI_RESULT || 'skipped',
              custom: process.env.CUSTOM_RESULT
            };

            const failed = Object.values(results).some(v => v === 'failure' || v === 'cancelled' || v === 'timed_out');
            const statusLabel = failed ? 'status:failed' : 'status:validation';
            const summary = [
              `LGFC Orchestrator validation ${failed ? 'failed' : 'passed'}.`,
              `- CI: ${results.ci}`,
              `- Semgrep: ${results.semgrep}`,
              `- DeepWiki: ${results.deepwiki}`,
              `- LGFC custom gates: ${results.custom}`
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr.number,
              body: summary
            });

            for (const issueNumber of issueNumbers) {
              try {
                const issue = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
                const current = (issue.data.labels || []).map(l => l.name);
                const keep = current.filter(name => !name.startsWith('status:'));
                await github.rest.issues.setLabels({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  labels: [...keep, statusLabel]
                });
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  body: `LGFC Orchestrator: validation ${failed ? 'failed' : 'passed'}.\nPR: ${pr.html_url}`
                });
              } catch (error) {
                core.warning(`Unable to update Issue #${issueNumber}: ${error.message}`);
              }
            }

            if (failed) {
              core.setFailed('Validation gate failed.');
            }
