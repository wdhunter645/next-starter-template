name: Design Authority Check

on:
  pull_request:
    paths:
      - "docs/**/*.md"

jobs:
  check-design-authority:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Detect duplicate design definitions
        run: |
          if grep -R "Canonical route list" docs | grep -v "LGFC-Production-Design-and-Standards.md"; then
            echo "ERROR: Canonical routes must only exist in LGFC-Production-Design-and-Standards.md"
            exit 1
          fi

          if grep -R "Public header variants" docs | grep -v "LGFC-Production-Design-and-Standards.md"; then
            echo "ERROR: Header definitions must only exist in LGFC-Production-Design-and-Standards.md"
            exit 1
          fi
