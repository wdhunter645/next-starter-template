name: OPS — Post-Merge Self-Healing

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Plan safe auto-fix actions without writing manifest files
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      apply_safe_fixes:
        description: Apply safe manifest auto-fixes when dry_run is false
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      open_escalation_issues:
        description: Open or update all escalation issue types when dry_run is false
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      open_visible_escalations:
        description: Open or update cursor_remediation_required escalation issues (safe automatic path)
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
  schedule:
    - cron: '0 6 * * *'
  push:
    branches: [main]
    paths:
      - scripts/ci/post_merge_self_heal_*.mjs
      - scripts/ci/post-merge-closeout/targets-ci-pending-rerun.json
      - scripts/ci/post-merge-closeout/targets-ci-pending.json
      - scripts/ci/post-merge-closeout/targets-remediation-backlog.json
      - .github/workflows/ops-post-merge-self-healing.yml
  workflow_run:
    workflows:
      - Post-Merge PR Body Closeout
      - Post-Merge Remediation
      - GATE — Post-Merge Readiness
    types: [completed]

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

jobs:
  self-heal:
    if: |
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion != 'cancelled'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Resolve execution mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DRY_RUN="${{ inputs.dry_run }}"
            APPLY_SAFE="${{ inputs.apply_safe_fixes }}"
            OPEN_ALL="${{ inputs.open_escalation_issues }}"
            OPEN_VISIBLE="${{ inputs.open_visible_escalations }}"
          else
            DRY_RUN="true"
            APPLY_SAFE="false"
            OPEN_ALL="false"
            OPEN_VISIBLE="true"
          fi
          echo "dry_run=${DRY_RUN}" >> "$GITHUB_OUTPUT"
          echo "apply_safe_fixes=${APPLY_SAFE}" >> "$GITHUB_OUTPUT"
          echo "open_escalation_issues=${OPEN_ALL}" >> "$GITHUB_OUTPUT"
          echo "open_visible_escalations=${OPEN_VISIBLE}" >> "$GITHUB_OUTPUT"
          node -e "const fs=require('node:fs'); fs.writeFileSync('post-merge-self-heal-mode.json', JSON.stringify({dry_run:process.env.DRY_RUN,apply_safe_fixes:process.env.APPLY_SAFE,open_escalation_issues:process.env.OPEN_ALL,open_visible_escalations:process.env.OPEN_VISIBLE}, null, 2)+'\n');" \
            DRY_RUN="$DRY_RUN" APPLY_SAFE="$APPLY_SAFE" OPEN_ALL="$OPEN_ALL" OPEN_VISIBLE="$OPEN_VISIBLE"

      - name: Collect live post-merge evidence
        id: collect
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SELF_HEAL_TRIGGER_RUN_ID: ${{ github.event.workflow_run.id || '' }}
          SELF_HEAL_TRIGGER_WORKFLOW_NAME: ${{ github.event.workflow_run.name || '' }}
          SELF_HEAL_TRIGGER_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion || '' }}
        run: |
          COLLECT_ARGS=(--output post-merge-self-heal-evidence.json)
          if [ -n "${SELF_HEAL_TRIGGER_RUN_ID}" ]; then
            COLLECT_ARGS+=(--workflow-run-id "$SELF_HEAL_TRIGGER_RUN_ID")
          fi
          node scripts/ci/post_merge_self_heal_collect_evidence.mjs "${COLLECT_ARGS[@]}"

      - name: Detect post-merge self-healing findings
        id: detect
        run: |
          node scripts/ci/post_merge_self_heal_detect.mjs \
            --evidence post-merge-self-heal-evidence.json \
            --output post-merge-self-heal-detection.json

      - name: Apply safe auto-fix actions
        id: apply
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          APPLY_ARGS=(--report post-merge-self-heal-detection.json --output post-merge-self-heal-apply.json)
          if [ "${{ steps.mode.outputs.dry_run }}" != "true" ] && [ "${{ steps.mode.outputs.apply_safe_fixes }}" = "true" ]; then
            APPLY_ARGS+=(--apply)
          fi
          node scripts/ci/post_merge_self_heal_apply.mjs "${APPLY_ARGS[@]}"

      - name: Open or update escalation issues
        id: escalate
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_JOB: ${{ github.job }}
        run: |
          ESCALATE_ARGS=(--report post-merge-self-heal-detection.json --output post-merge-self-heal-escalation.json)
          if [ "${{ steps.mode.outputs.open_escalation_issues }}" = "true" ] && [ "${{ steps.mode.outputs.dry_run }}" != "true" ]; then
            ESCALATE_ARGS+=(--apply --scope all)
          elif [ "${{ steps.mode.outputs.open_visible_escalations }}" = "true" ]; then
            ESCALATE_ARGS+=(--apply-visible-escalations)
          fi
          node scripts/ci/post_merge_self_heal_escalate.mjs "${ESCALATE_ARGS[@]}"

      - name: Upload self-healing artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-merge-self-healing-report
          path: |
            post-merge-self-heal-mode.json
            post-merge-self-heal-evidence.json
            post-merge-self-heal-detection.json
            post-merge-self-heal-apply.json
            post-merge-self-heal-escalation.json
            post-merge-self-heal-operator-summary.md
          if-no-files-found: warn

      - name: Write operator summary
        if: always()
        env:
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          node scripts/ci/post_merge_self_heal_operator_summary.mjs \
            --mode post-merge-self-heal-mode.json \
            --evidence post-merge-self-heal-evidence.json \
            --detection post-merge-self-heal-detection.json \
            --apply post-merge-self-heal-apply.json \
            --escalation post-merge-self-heal-escalation.json \
            --workflow-run-url "$GITHUB_RUN_URL" \
            --output post-merge-self-heal-operator-summary.md
          cat post-merge-self-heal-operator-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Fail on partial detection ingestion errors
        if: always() && hashFiles('post-merge-self-heal-detection.json') != ''
        run: |
          node -e "const r=require('./post-merge-self-heal-detection.json'); if (r.status==='partial_failure') process.exit(2);"
