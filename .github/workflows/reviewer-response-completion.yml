name: GATE — Reviewer Response Completion

on:
  pull_request_target:
    types: [opened, reopened, edited, synchronize, ready_for_review]
  issue_comment:
    types: [created, edited, deleted]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  reviewer-response-completion:
    runs-on: ubuntu-latest
    concurrency:
      group: reviewer-response-completion-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout reviewer lifecycle helpers
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Auto-repair trusted PR body evidence
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          script: |
            const issue = context.payload.issue;
            const pr = context.payload.pull_request;
            const eventName = context.eventName;

            if (eventName === 'issue_comment' && !issue?.pull_request?.url) {
              core.info('Issue comment is not associated with a pull request; skipping PR body auto-repair.');
              return;
            }

            const prNumber = pr?.number || (issue?.pull_request ? issue.number : null);
            if (!prNumber) {
              core.info('No pull request context; skipping PR body auto-repair.');
              return;
            }

            core.info(`Running PR body auto-repair for PR #${prNumber}.`);

            const { execFileSync } = require('node:child_process');
            execFileSync(
              'node',
              ['scripts/ci/run_pr_body_auto_repair.mjs'],
              {
                env: {
                  ...process.env,
                  GITHUB_TOKEN: process.env.GITHUB_TOKEN,
                  GITHUB_REPOSITORY: `${context.repo.owner}/${context.repo.repo}`,
                  PR_NUMBER: String(prNumber),
                  GITHUB_EVENT_NAME: eventName,
                },
                stdio: 'inherit',
              }
            );

      - name: Evaluate reviewer lifecycle gate
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          script: |
            const issue = context.payload.issue;
            const pr = context.payload.pull_request;
            const eventName = context.eventName;

            if (eventName === 'issue_comment' && !issue?.pull_request?.url) {
              core.info('Issue comment is not associated with a pull request; skipping reviewer lifecycle gate.');
              return;
            }

            const prNumber = pr?.number || (issue?.pull_request ? issue.number : null);
            if (!prNumber) {
              core.info('No pull request context; skipping reviewer lifecycle gate.');
              return;
            }

            const enforceFailure = eventName === 'pull_request_target';
            core.info(`Running reviewer lifecycle gate for PR #${prNumber} (enforceFailure=${enforceFailure}).`);

            const { execFileSync } = require('node:child_process');
            execFileSync(
              'node',
              ['scripts/ci/reviewer_lifecycle_gate.mjs'],
              {
                env: {
                  ...process.env,
                  GITHUB_TOKEN: process.env.GITHUB_TOKEN,
                  GITHUB_REPOSITORY: `${context.repo.owner}/${context.repo.repo}`,
                  PR_NUMBER: String(prNumber),
                  GITHUB_EVENT_NAME: eventName,
                  ENFORCE_FAILURE: enforceFailure ? 'true' : 'false',
                },
                stdio: 'inherit',
              }
            );
