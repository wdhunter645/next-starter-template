name: GATE — Reviewer Response Completion

on:
  pull_request_target:
    types: [opened, reopened, edited, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]

permissions:
  pull-requests: read
  issues: write
  contents: read

jobs:
  reviewer-response-completion:
    runs-on: ubuntu-latest
    steps:
      - name: Verify reviewer response accounting
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;

            if (!pr) {
              core.info('No pull request context; skipping reviewer response completion gate.');
              return;
            }

            const prNumber = pr.number;
            const { data: pull } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            const body = pull.body || '';

            const comments = await github.paginate(github.rest.pulls.listReviewComments, {
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const actionable = comments.filter((comment) => {
              const user = (comment.user && comment.user.login) || '';
              const text = comment.body || '';

              if (user === 'github-actions[bot]') return false;
              if (user === 'cloudflare-workers-and-pages[bot]') return false;
              if (/<!--\s*reviewer-response-ignore\s*-->/i.test(text)) return false;

              return true;
            });

            if (actionable.length === 0) {
              core.info('No inline reviewer comments require explicit accounting.');
              return;
            }

            const hasSection = /##\s+REVIEWER RESPONSE ACCOUNTING/i.test(body);
            const missing = actionable.filter((comment) => {
              const url = comment.html_url || '';
              const idToken = `review-comment:${comment.id}`;
              return !body.includes(url) && !body.includes(idToken);
            });

            if (!hasSection || missing.length > 0) {
              const lines = [
                'Reviewer response completion gate failed.',
                '',
                'Every inline reviewer comment must be explicitly listed in the PR body before merge readiness.',
                '',
                'Add a section like:',
                '',
                '## REVIEWER RESPONSE ACCOUNTING',
                '- [x] Reviewed all reviewer comments.',
                '- [x] Accepted / rejected / ignored each actionable comment with rationale.',
                '- review-comment:<id> — accepted|rejected|ignored — <rationale>',
                '',
                'Unaccounted reviewer comments:',
                ...missing.map((comment) => `- review-comment:${comment.id} ${comment.html_url}`),
              ];

              try {
                const marker = '<!-- reviewer-response-completion-gate -->';
                const existing = await github.paginate(github.rest.issues.listComments, {
                  owner,
                  repo,
                  issue_number: prNumber,
                  per_page: 100,
                });
                const prior = existing.find((comment) => (comment.body || '').includes(marker));
                const commentBody = `${marker}\n\n${lines.join('\n')}`;
                if (prior) {
                  await github.rest.issues.updateComment({ owner, repo, comment_id: prior.id, body: commentBody });
                } else {
                  await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: commentBody });
                }
              } catch (error) {
                core.warning(`Unable to write reviewer response gate comment: ${error.message}`);
              }

              core.setFailed(lines.join('\n'));
              return;
            }

            core.info(`Reviewer response accounting complete for ${actionable.length} inline reviewer comment(s).`);
