name: GATE — Reviewer Response Completion

on:
  pull_request_target:
    types: [opened, reopened, edited, synchronize, ready_for_review]
  issue_comment:
    types: [created, edited, deleted]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]

permissions:
  pull-requests: read
  issues: write
  contents: read

jobs:
  reviewer-response-completion:
    runs-on: ubuntu-latest
    concurrency:
      group: reviewer-response-completion-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true
    steps:
      - name: Verify required reviewer presence and response accounting
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const issue = context.payload.issue;
            const quietPeriodSeconds = 120;

            if (context.eventName === 'issue_comment' && !issue?.pull_request?.url) {
              core.info('Issue comment is not associated with a pull request; skipping reviewer response completion gate.');
              return;
            }

            const prNumber = pr?.number || (issue?.pull_request ? issue.number : null);
            if (!prNumber) {
              core.info('No pull request context; skipping reviewer response completion gate.');
              return;
            }

            const { data: pull } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            const body = pull.body || '';
            const headSha = pull.head?.sha || '';
            const accountingSectionMatch = body.match(/##\s+REVIEWER RESPONSE ACCOUNTING\b([\s\S]*?)(?:\n##\s+|$)/i);
            const accountingSection = accountingSectionMatch?.[1] || '';
            const escapeRegExp = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

            const issueComments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const reviewComments = await github.paginate(github.rest.pulls.listReviewComments, {
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const requiredReviewers = [
              {
                name: 'Copilot',
                users: ['copilot-pull-request-reviewer[bot]', 'copilot-pull-request-reviewer', 'Copilot'],
              },
              {
                name: 'Cubic',
                users: ['cubic-dev-ai[bot]', 'cubic-dev-ai'],
              },
              {
                name: 'Gemini',
                users: ['gemini-code-assist[bot]', 'gemini-code-assist'],
              },
            ];
            const reviewerUsers = new Set(requiredReviewers.flatMap((reviewer) => reviewer.users));

            const reviewerArtifacts = [
              ...issueComments
                .filter((comment) => reviewerUsers.has(comment.user?.login || ''))
                .map((comment) => ({
                  kind: 'issue-comment',
                  user: comment.user?.login || '',
                  body: comment.body || '',
                  createdAt: comment.created_at,
                  updatedAt: comment.updated_at,
                })),
              ...reviewComments
                .filter((comment) => reviewerUsers.has(comment.user?.login || ''))
                .map((comment) => ({
                  kind: 'review-comment',
                  user: comment.user?.login || '',
                  body: comment.body || '',
                  commitId: comment.commit_id || '',
                  createdAt: comment.created_at,
                  updatedAt: comment.updated_at,
                })),
              ...reviews
                .filter((review) => reviewerUsers.has(review.user?.login || ''))
                .map((review) => ({
                  kind: 'review',
                  user: review.user?.login || '',
                  body: review.body || '',
                  commitId: review.commit_id || '',
                  submittedAt: review.submitted_at,
                })),
            ];

            const latestRelevantTimestamp = reviewerArtifacts
              .map((artifact) => artifact.updatedAt || artifact.createdAt || artifact.submittedAt)
              .filter(Boolean)
              .map((value) => Date.parse(value))
              .filter((value) => Number.isFinite(value))
              .sort((a, b) => b - a)[0];
            const quietUntil = latestRelevantTimestamp ? latestRelevantTimestamp + quietPeriodSeconds * 1000 : null;
            const now = Date.now();

            const presentReviewers = requiredReviewers.filter((reviewer) => {
              return reviewerArtifacts.some((artifact) => reviewer.users.includes(artifact.user));
            }).map((reviewer) => reviewer.name);

            const missingReviewers = requiredReviewers
              .map((reviewer) => reviewer.name)
              .filter((name) => !presentReviewers.includes(name));

            const reviewersMissingLatestHead = requiredReviewers
              .filter((reviewer) => {
                return !reviewerArtifacts.some((artifact) => {
                  return reviewer.users.includes(artifact.user) && artifact.commitId === headSha;
                });
              })
              .map((reviewer) => reviewer.name);

            const actionable = reviewComments.filter((comment) => {
              const user = comment.user?.login || '';
              const text = comment.body || '';

              if (!reviewerUsers.has(user)) return false;
              if (/<!--\s*reviewer-response-ignore\s*-->/i.test(text)) return false;
              if (comment.line == null && comment.position == null) return false;

              return true;
            });

            const hasSection = Boolean(accountingSectionMatch);
            const missingAccounting = actionable.filter((comment) => {
              const url = comment.html_url || '';
              const idToken = `review-comment:${comment.id}`;
              const nodeToken = comment.node_id ? `review-comment-node:${comment.node_id}` : '';
              const tokens = [idToken, nodeToken, url].filter(Boolean).map(escapeRegExp).join('|');
              const accountingPattern = new RegExp(
                `^-\\s+.*(?:${tokens})\\s*[—\\-]\\s*(accepted|rejected|ignored)\\s*[—\\-]\\s*\\S.*$`,
                'im'
              );
              return !accountingPattern.test(accountingSection);
            });

            const marker = '<!-- reviewer-response-completion-gate -->';

            async function upsertGateComment(lines) {
              const prior = issueComments.find((comment) => (comment.body || '').includes(marker));
              const commentBody = `${marker}\n\n${lines.join('\n')}`;
              if (prior) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: prior.id, body: commentBody });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: commentBody });
              }
            }

            const quietPeriodActive = quietUntil !== null && now < quietUntil;

            if (
              missingReviewers.length > 0 ||
              reviewersMissingLatestHead.length > 0 ||
              quietPeriodActive ||
              !hasSection ||
              missingAccounting.length > 0
            ) {
              const quietRemainingSeconds = quietPeriodActive ? Math.ceil((quietUntil - now) / 1000) : 0;
              const lines = [
                'Reviewer response completion gate failed.',
                '',
                'Required reviewer dispositions must be visible before merge readiness:',
                '- Copilot',
                '- Cubic',
                '- Gemini',
                '',
                `Current head SHA: ${headSha}`,
                `Present reviewer dispositions: ${presentReviewers.length ? presentReviewers.join(', ') : 'none'}`,
                `Missing reviewer dispositions: ${missingReviewers.length ? missingReviewers.join(', ') : 'none'}`,
                `Reviewers missing latest-head artifact: ${reviewersMissingLatestHead.length ? reviewersMissingLatestHead.join(', ') : 'none'}`,
                `Quiet period seconds: ${quietPeriodSeconds}`,
                `Quiet period remaining: ${quietRemainingSeconds}`,
                '',
                'Every actionable inline reviewer comment must be explicitly listed in the PR body before merge readiness.',
                '',
                'Required PR body section:',
                '',
                '## REVIEWER RESPONSE ACCOUNTING',
                '- [x] Copilot disposition received: <summary>',
                '- [x] Cubic disposition received: <summary>',
                '- [x] Gemini disposition received: <summary>',
                '- [x] Reviewed all reviewer comments.',
                '- [x] Accepted / rejected / ignored each actionable comment with rationale.',
                '- review-comment:<id> — accepted|rejected|ignored — <rationale>',
                '',
                'Unaccounted reviewer comments:',
                ...(missingAccounting.length ? missingAccounting.map((comment) => `- review-comment:${comment.id} ${comment.html_url}`) : ['- none']),
              ];

              try {
                await upsertGateComment(lines);
              } catch (error) {
                core.warning(`Unable to write reviewer response gate comment: ${error.message}`);
              }

              core.setFailed(lines.join('\n'));
              return;
            }

            try {
              await upsertGateComment([
                'Reviewer response completion gate passed.',
                '',
                `Current head SHA: ${headSha}`,
                `Present reviewer dispositions: ${presentReviewers.join(', ')}`,
                `Inline reviewer comments accounted: ${actionable.length}`,
                `Quiet period seconds: ${quietPeriodSeconds}`,
              ]);
            } catch (error) {
              core.warning(`Unable to update reviewer response gate comment: ${error.message}`);
            }

            core.info(`Reviewer response accounting complete. Required reviewers present: ${presentReviewers.join(', ')}. Inline comments accounted: ${actionable.length}.`);
